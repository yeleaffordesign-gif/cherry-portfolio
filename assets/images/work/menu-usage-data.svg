<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" font-family="'Inter', sans-serif">
  <!-- Title -->
  <text x="40" y="42" font-family="'Fraunces', serif" font-size="20" font-weight="500" fill="#1a1a1a" font-style="italic">「旧版」菜单使用数据</text>
  <text x="40" y="66" font-size="12.5" fill="#666">基于真实埋点的顶部菜单点击量（每日均值）</text>
  
  <!-- 四个视角的横向条形对比 -->
  <!-- 每行 y: 110, 156, 202, 248 -->
  <!-- 条形起点 x: 160  长度按比例：业务监控 825 为 100% = 480px -->
  
  <!-- 业务监控 825 - 100% -->
  <g transform="translate(40, 110)">
    <text x="0" y="6" font-size="13" fill="#1a1a1a">业务监控</text>
    <rect x="120" y="-6" width="480" height="14" fill="#2d5a3d" opacity="0.85"/>
    <text x="610" y="6" font-size="13" fill="#1a1a1a" font-weight="500">825</text>
  </g>
  
  <!-- 我的 546 - 66% -->
  <g transform="translate(40, 156)">
    <text x="0" y="6" font-size="13" fill="#1a1a1a">我的</text>
    <rect x="120" y="-6" width="318" height="14" fill="#2d5a3d" opacity="0.85"/>
    <text x="448" y="6" font-size="13" fill="#1a1a1a" font-weight="500">546</text>
  </g>
  
  <!-- 应用监控 459 - 55% -->
  <g transform="translate(40, 202)">
    <text x="0" y="6" font-size="13" fill="#1a1a1a">应用监控</text>
    <rect x="120" y="-6" width="267" height="14" fill="#2d5a3d" opacity="0.85"/>
    <text x="397" y="6" font-size="13" fill="#1a1a1a" font-weight="500">459</text>
  </g>
  
  <!-- 工作台 272 - 33% -->
  <g transform="translate(40, 248)">
    <text x="0" y="6" font-size="13" fill="#1a1a1a">工作台</text>
    <rect x="120" y="-6" width="158" height="14" fill="#999" opacity="0.7"/>
    <text x="288" y="6" font-size="13" fill="#1a1a1a" font-weight="500">272</text>
  </g>
  
  <!-- 注释 -->
  <text x="40" y="304" font-size="12" fill="#666" font-style="italic">「我的」使用频率仅次于业务监控，与「工作台」共同承担"查找"角色——</text>
  <text x="40" y="322" font-size="12" fill="#666" font-style="italic">用户来「我的」更多是为了找东西，而非个性化推荐。</text>
</svg>
