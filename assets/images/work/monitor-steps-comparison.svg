<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" font-family="'Inter', sans-serif">
  <!-- Title -->
  <text x="40" y="42" font-family="'Fraunces', serif" font-size="20" font-weight="500" fill="#1a1a1a" font-style="italic">监控项创建步数</text>
